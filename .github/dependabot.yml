version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: daily
      time: "08:00"
      timezone: "America/New_York"
    target-branch: "chore/dependabot"
    labels: ['dependabot']
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 4
    labels:
      - dependabot
    commit-message:
      prefix: "chore"
